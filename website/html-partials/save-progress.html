<section
  class="ow-modal ow-save-progress"
  data-save-progress-root
  hidden
  aria-hidden="true"
  role="dialog"
  aria-modal="true"
>
  <div class="ow-modal__backdrop" data-save-progress-backdrop></div>
  <div class="ow-modal__dialog" data-save-progress-dialog tabindex="-1">
    <div class="ow-modal__surface">
      <h2 class="ow-modal__title" data-save-progress-title>Сохраняем изменения</h2>
      <div class="ow-modal__body ow-save-progress__body">
        <p class="ow-save-progress__message" data-save-progress-message>Подготавливаем этапы сохранения...</p>
        <p class="ow-save-progress__hint ow-muted">Не закрывайте страницу, пока окно не исчезнет.</p>

        <ol class="ow-save-progress__steps" data-save-progress-steps></ol>

        <section class="ow-save-progress__transfer" data-upload-progress-root hidden>
          <div class="progressbarWrapper ow-save-progress__bar">
            <span data-upload-progress-bar></span>
            <div class="ow-upload-progress__body">
              <p class="ow-upload-progress__text" data-upload-progress-text></p>
              <div class="ow-upload-progress__meta" data-upload-progress-meta hidden>
                <span class="ow-upload-progress__meta-item" data-upload-progress-meta-size></span>
                <span class="ow-upload-progress__meta-item" data-upload-progress-meta-speed></span>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
</section>
