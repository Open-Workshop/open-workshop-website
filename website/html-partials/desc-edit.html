<div
  limit="{{ limit | default('256') }}"
  class="desc-edit"
  data-desc-edit
>
  <div class="desc-edit__surface">
    <div
      class="desc-edit__editor"
      data-desc-editor
      data-placeholder="{{ placeholder | default('Описание не может быть пустым!(') }}"
    ></div>
  </div>

  <textarea
    placeholder="{{ placeholder | default('Описание не может быть пустым!(') }}"
    class="desc-edit__transport"
    data-desc-transport
    spellcheck="false"
    hidden
  >{{ init_text | default('') }}</textarea>

  <div class="desc-edit__status">
    <span class="desc-edit__limit" data-desc-limit title="Ограничение в {{ limit | default('256') }} символов описания!"></span>
  </div>
</div>
