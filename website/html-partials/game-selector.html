<div
    class="mini-cont ow-stack game-selector"
    data-api-base="{{ ow.api.base }}"
    data-game-info-path="{{ ow.api.paths.game.info.path }}"
    data-game-list-path="{{ ow.api.paths.game.list.path }}"
>
    <h2 class="game-selector__title">Игра-владелец</h2>
    <div class="game-selector__row">
        <img id="logo-game-select" class="game-selector__logo" src="/assets/images/loading.webp" data-fallback-src="{{ ow.assets.images.fallback }}" alt="Логотип игры">
        <div class="game-selector__info">
            <div class="game-selector__name-row">
                <button class="edit-mod-game-name-set" type="button" data-action="legacy-game-selector-apply"><img src="/assets/images/check-mini.svg" alt="Изображение кнопки"></button>
                <div class="game-selector__name">
                    <p id="name-game-select">Загрузка...</p>
                    <input dynamlen type="text" placeholder="Найти по имени..." class="edit-mod-game-input-name" data-role="legacy-game-selector-name">
                </div>
            </div>

            <input type="number" placeholder="ID игры-владельца" startdata="{{ init_id | default('') }}" value="{{ init_id | default('') }}" class="edit-mod-game-input" data-role="legacy-game-selector-id" {% if init_id %}disabled{% endif %}>
        </div>
    </div>

    {% if init_id %}
    <button class="enable-edit-game-mod" type="button" data-action="legacy-game-selector-unlock">Разблокировать</button>
    {% endif %}

    <script src="/assets/scripts/components/game-selector.js"></script>
</div>
