{% set mod_authors = authors if authors is defined else [] %}

<div
  id="mod-authors-manager"
  class="standart-panel mod-authors"
  data-authors='{{ mod_authors | tojson | forceescape }}'
>
  <div class="mod-authors__header">
    <p class="ow-muted">Соавторы</p>
    <span class="ow-badge" data-authors-count>0 шт</span>
  </div>

  <div class="outline-container mod-authors__list" data-authors-list></div>
  <p class="mod-authors__empty ow-muted" data-authors-list-empty hidden>Список авторов пуст</p>

  <div class="mod-authors__add">
    <div class="mod-authors__search" data-authors-search>
      <input
        type="text"
        class="mod-authors__input"
        data-authors-input
        placeholder="Ник, ID или /user/123"
        autocomplete="off"
        spellcheck="false"
        aria-autocomplete="list"
        aria-expanded="false"
        aria-controls="mod-authors-suggestions"
      >
      <div
        class="picker-editor__results-list mod-authors__dropdown"
        id="mod-authors-suggestions"
        data-authors-suggestions
        role="listbox"
        aria-live="polite"
        aria-label="Подсказки по пользователям"
      >
        <p class="picker-editor__empty mod-authors__dropdown-empty" data-authors-suggestions-empty>Введите ник для поиска</p>
      </div>
    </div>
    <button type="button" class="button-style button-style-small" data-action="authors-add">Добавить</button>
  </div>

  <p class="mod-authors__hint ow-muted">При вводе ника появляется выпадающий список. Добавление по ID профиля, нику или ссылке `/user/123`. Кнопка `Владелец` передаёт владение выбранному автору.</p>
</div>
