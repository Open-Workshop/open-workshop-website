<!DOCTYPE html>
<html lang="ru" >
  <head>
    <meta charset="UTF-8">
    <title>{% block title %}Open Workshop{% endblock %}</title>
    <meta name="darkreader-lock">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block description %}Свободный каталог модификаций{% endblock %}">
    <link rel="icon" type="image/png" href="/assets/images/favicon.png"/>

    <meta property="og:site_name" content="Open Workshop" />
    <meta property="og:title" content="{{ self.title() }}">
    <meta property="og:description" content="{{ self.description() }}">
    {% if is_mod_data %}
    <meta property="og:image" content="{% block metaimage %}{% endblock %}">
    <meta property="og:image:alt" content="Logo of mod" />
    <meta property="og:type" content="article" />
    <meta property="article:published_time" content="{% block published_time %}{% endblock %}" />
    <meta property="article:modified_time" content="{% block modified_time %}{% endblock %}" />
    <link rel="canonical" href="https://openworkshop.miskler.ru/mod/{{ data[0]['id'] }}">
    {% endif %}
    {% if is_user_data %}
    <meta property="og:image" content="{{ is_user_data['logo'] }}">
    <meta property="og:image:alt" content="User avatar" />
    <meta property="og:type" content="article" />
    <link rel="canonical" href="https://openworkshop.su/user/{{ is_user_data['id'] }}">
    {% endif %}


    <!-- основные -->
    <link href="/assets/styles/style.css" rel="stylesheet"/>
    <link href="/assets/styles/new-standart.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/mains.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/header.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/footer.css" rel="stylesheet"/>

    <!-- элементы -->
    <link href="/assets/styles/elements/a.css" rel="stylesheet"/>
    <link href="/assets/styles/elements/input.css" rel="stylesheet"/>
    <link href="/assets/styles/elements/select.css" rel="stylesheet"/>
    <link href="/assets/styles/elements/button.css" rel="stylesheet"/>
    <link href="/assets/styles/elements/img.css" rel="stylesheet"/>

    <!-- структуры -->
    <link href="/assets/styles/mini-parts/balloon.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/images-view.css" rel="stylesheet"/>
    <link href="/assets/styles/vendors/quill.bubble.css" rel="stylesheet"/>
    <link href="/assets/styles/vendors/photoswipe.css" rel="stylesheet"/>
    <link href="/assets/styles/vendors/ow-language.css" rel="stylesheet"/>
    <link href="/assets/styles/vendors/cards.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/containers.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/tags.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/ui-patterns.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/editor-widgets.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/dependence-edit.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/description-module.css" rel="stylesheet"/>
    <link href="/assets/styles/mini-parts/upload-file.css" rel="stylesheet"/>
    {% if catalog %}
    <script src="/assets/scripts/vendors/masonry.pkgd.min.js"></script>

    <link rel="preload" as="image" href="/assets/images/loading.webp"/>
    <link rel="prefetch" as="image" href="{{ ow.assets.images.fallback }}"/>
    <link rel="preconnect" href="{{ ow.api.base }}" />
    <link rel="canonical" href="https://openworkshop.miskler.ru">
    {% endif %}
    
    <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml"/>
    <!-- Сторонние сервисы -->
    <meta name="yandex-verification" content="4f45530de4f44a80" />
    <meta name="msvalidate.01" content="93E9A08A2C90737FB01BF7BE50B2433F" />
    <link href="/assets/styles/mini-parts/toast-modern.css" rel="stylesheet"/>
    <script src="https://yastatic.net/s3/passport-sdk/autofill/v1/sdk-suggest-with-polyfills-latest.js"></script>
    <script id="ow-config" type="application/json">{{ ow | tojson }}</script>
  </head>
	  <body
      manager-url="{{ ow.api.base }}"
      data-session-authenticated="{{ 'true' if session_access and session_access.authenticated else 'false' }}"
      data-can-add-mod="{{ 'true' if session_access and session_access.can_add_mod else 'false' }}"
      data-can-add-game="{{ 'true' if session_access and session_access.can_add_game else 'false' }}"
      data-can-edit-game="{{ 'true' if session_access and session_access.can_edit_game else 'false' }}"
    >
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a)
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=106507343', 'ym');

        ym(106507343, 'init', {ssr:true, webvisor:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <noscript><div><img src="https://mc.yandex.ru/watch/106507343" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    <!-- /Yandex.Metrika counter -->

    {% include 'html-partials/header.html' %}

    <div id="standart-container">
      <script src="/assets/scripts/vendors/toast.min.js"></script>
      <script type="module" src="/assets/scripts/vendors/images-zoom.js"></script>

      <script src="/assets/scripts/ow-core.js"></script>
      <script src="/assets/scripts/ow-logic.js"></script>
      <script src="/assets/scripts/ow-ui.js"></script>
      <script src="/assets/scripts/vendors/url-manager.js"></script>
      <script src="/assets/scripts/vendors/cookie-manager.js"></script>
      <script src="/assets/scripts/vendors/description-codec.js"></script>
      <script src="/assets/scripts/vendors/formating.js"></script>
      <script src="/assets/scripts/vendors/quill.js"></script>
      <script src="/assets/scripts/vendors/desc-edit.js"></script>
      <script src="/assets/scripts/components/description-module.js"></script>
      <script src="/assets/scripts/components/upload-file.js"></script>
      <script src="/assets/scripts/vendors/cards.js"></script>
      
      <script src="/assets/scripts/main.js"></script>

      {% block content %}{% endblock %}
    </div>

    {% include 'html-partials/footer.html' %}

    <script src="/assets/scripts/login.js"></script>

</body>
</html>
